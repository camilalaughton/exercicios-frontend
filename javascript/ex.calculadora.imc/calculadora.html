<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <header>
        <h1>Calculadora IMC</h1>
    </header>
    <main>
        <p>Informe seus dados abaixo!</p>
        <form>
            <label for="height">Altura (m)</label>
            <input type="text" name="height" id="height" placeholder="1.75" required>
            <label for="weight">Peso (kg)</label>
            <input type="text" name="weight" id="weight" placeholder="70" required>
            <button type="button" id="btn">Calcular</button>
        </form>
        <div class="result">
            <p id="resultado"></p>
        </div>
    </main>

    <script>
       
       function calcular() {
        let pesoTexto = document.getElementById("weight").value;
        let alturaTexto = document.getElementById("height").value;

        let peso = parseFloat(pesoTexto);
        let altura = parseFloat(alturaTexto);

        if (isNaN(peso) || isNaN(altura) || altura === 0) {
        document.getElementById("resultado").textContent = "Digite valores válidos!";
        return;
        }

        let imc = peso / (altura ** 2); 
        document.getElementById("resultado").textContent = "IMC: " + imc.toFixed(2);
       }

        document.getElementById("btn").addEventListener("click", calcular);
        
    </script>
</body>
</html>
