<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <header>
        <h1>Ficha do Personagem</h1>
    </header>
    <main>
        <form action="#" method="get">
        <label for="nome">Nome: </label>
        <input type="text" name="nome" id="nome" required>
        <label for="forca">Força: </label>
        <input type="text" name="forca" id="forca" required placeholder="Número de 1 a 10">
        <label for="agilidade">Agilidade: </label>
        <input type="text" name="agilidade" id="agilidade" required placeholder="Número de 1 a 10"> 
        <label for="nivel">Nível: </label>
        <input type="text" name="nivel" id="nivel" required placeholder="Número de 1 a 10">
        </form>
    
    </main>
</body>
</html>
