<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Perfil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.svg" type="image/svg">
    <script src="https://kit.fontawesome.com/651c30517c.js" crossorigin="anonymous"></script>
</head> 
<body>
    <header>
        <h1>Perfil da Candidata</h1>
    </header>
    <main>
        <div class="card">
            <img src="pexels-foto-perfil.jpg" alt="imagem do perfil" class="img">
                <div class="text">
                    <p class="name">Ana Clara da Silva</p>
                    <p class="profession">Desenvolvedora Front-End</p>
                    <p class="bio">Apaixonada por tecnologia e design, em constante aprendizado. Sonho em criar interfaces modernas, acessíveis e intuitivas. Transformo ideias em experiências digitais que realmente fazem a diferença na vida das pessoas!</p>
                    <a href="https://github.com/" target="_blank"><i class="fa-brands fa-github"></i></a>
                    <a href="https://www.linkedin.com/login/pt/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                </div>
        </div>
    </main>
</body>
</html>
